const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function abrir(senha) {
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey("raw", enc.encode(senha), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt:b64d(PACOTE.salt), iterations:PACOTE.iter, hash:"SHA-256" },
    base, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
  const claro = await crypto.subtle.decrypt(
    { name:"AES-GCM", iv:b64d(PACOTE.iv) }, key, b64d(PACOTE.ct));
  return new TextDecoder().decode(claro);
}

document.getElementById("f").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const b = document.getElementById("b"), e = document.getElementById("e");
  b.disabled = true; b.textContent = "Abrindo..."; e.textContent = "";
  try {
    const html = await abrir(document.getElementById("s").value);
    sessionStorage.setItem("painel_ok", "1");
    document.open(); document.write(html); document.close();
  } catch (_) {
    e.textContent = "Senha incorreta.";
    b.disabled = false; b.textContent = "Entrar";
  }
});
